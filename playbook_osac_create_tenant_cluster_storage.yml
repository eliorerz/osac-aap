---
- name: Create StorageClasses and CSI driver on target cluster (Stage 2)
  hosts: localhost
  gather_facts: false

  vars:
    tenant_name: "{{ ansible_eda.event.payload.metadata.annotations['osac.openshift.io/tenant'] }}"
    tenant_namespace: "{{ ansible_eda.event.payload.metadata.namespace }}"
    tenant_uid: "{{ ansible_eda.event.payload.metadata.uid }}"
    _storage_tiers_raw: "{{ lookup('env', 'STORAGE_TIERS') }}"
    _storage_snapshots: "{{ lookup('env', 'STORAGE_SNAPSHOTS_ENABLED') | default('true', true) | bool }}"

  pre_tasks:
    - name: Show EDA Event
      ansible.builtin.debug:
        var: ansible_eda.event.payload

    - name: Validate tenant payload is present
      ansible.builtin.fail:
        msg: "tenant must be provided via ansible_eda.event.payload with metadata.name, metadata.namespace, and metadata.uid set"
      when: >-
        ansible_eda is not defined or
        ansible_eda.event.payload.metadata.name is not defined or
        ansible_eda.event.payload.metadata.name | length == 0 or
        ansible_eda.event.payload.metadata.namespace is not defined or
        ansible_eda.event.payload.metadata.namespace | length == 0 or
        ansible_eda.event.payload.metadata.uid is not defined or
        ansible_eda.event.payload.metadata.uid | length == 0

    - name: Validate STORAGE_TIERS env var is configured
      ansible.builtin.fail:
        msg: >-
          STORAGE_TIERS env var must be set at deployment time as a JSON array.
          Example: [{"name":"default","protocol":"nfs","provider":"vast"}]
      when: _storage_tiers_raw | length == 0

    - name: Parse STORAGE_TIERS JSON
      block:
        - name: Parse tier list from env var
          ansible.builtin.set_fact:
            _storage_tiers: "{{ _storage_tiers_raw | from_json }}"
      rescue:
        - name: Fail on malformed STORAGE_TIERS JSON
          ansible.builtin.fail:
            msg: >-
              STORAGE_TIERS env var contains invalid JSON.
              Value: '{{ _storage_tiers_raw }}'.
              Expected a JSON array of tier objects with name, protocol, and provider fields.

    - name: Write admin_kubeconfig to temporary file when provided
      when: >-
        ansible_eda.event.admin_kubeconfig is defined and
        ansible_eda.event.admin_kubeconfig | length > 0
      ansible.builtin.set_fact:
        _remote_kubeconfig: "{{ ansible_eda.event.admin_kubeconfig | osac.service.to_temp_file(suffix='.kubeconfig') }}"

    # --- BEGIN TEMPORARY DEBUG BLOCK (remove after 401 investigation) ---
    - name: "[DEBUG] Show kubeconfig file info"
      when: _remote_kubeconfig is defined
      ansible.builtin.command:
        cmd: "stat {{ _remote_kubeconfig }}"
      register: _debug_stat
      changed_when: false
      ignore_errors: true

    - name: "[DEBUG] stat result"
      when: _debug_stat is not skipped
      ansible.builtin.debug:
        var: _debug_stat.stdout_lines

    - name: "[DEBUG] Show kubeconfig server and context"
      when: _remote_kubeconfig is defined
      ansible.builtin.command:
        cmd: "grep -E 'server:|current-context:|name:' {{ _remote_kubeconfig }}"
      register: _debug_kc_grep
      changed_when: false
      ignore_errors: true

    - name: "[DEBUG] kubeconfig grep result"
      when: _debug_kc_grep is not skipped
      ansible.builtin.debug:
        var: _debug_kc_grep.stdout_lines

    - name: "[DEBUG] Write debug script"
      when: _remote_kubeconfig is defined
      ansible.builtin.copy:
        dest: /tmp/debug_kubeconfig.py
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, yaml, base64, tempfile, subprocess, os, ssl, warnings
          warnings.filterwarnings("ignore")

          kc_path = sys.argv[1]
          kc = yaml.safe_load(open(kc_path))
          cluster = kc["clusters"][0]["cluster"]
          user = kc["users"][0]["user"]
          server = cluster["server"]

          print("=== KUBECONFIG ===")
          print("Server:", server)
          print("Context:", kc.get("current-context", "unknown"))

          # Extract hostname for DNS check
          import re
          m = re.match(r"https?://([^:/]+)", server)
          hostname = m.group(1) if m else "unknown"
          print("Hostname:", hostname)

          # DNS resolution
          print("\n=== DNS RESOLUTION ===")
          r = subprocess.run(["getent", "hosts", hostname], capture_output=True, text=True)
          if r.returncode == 0:
              print(r.stdout.strip())
          else:
              r2 = subprocess.run(["nslookup", hostname], capture_output=True, text=True)
              print(r2.stdout.strip() if r2.returncode == 0 else "DNS FAILED")

          # Decode certs
          ca_pem = base64.b64decode(cluster["certificate-authority-data"])
          cert_pem = base64.b64decode(user["client-certificate-data"])
          key_pem = base64.b64decode(user["client-key-data"])

          files = {}
          for name, data in [("ca", ca_pem), ("cert", cert_pem), ("key", key_pem)]:
              f = tempfile.NamedTemporaryFile(delete=False, suffix=".pem")
              f.write(data)
              f.close()
              files[name] = f.name

          # Show cert subjects
          print("\n=== CLIENT CERT ===")
          r = subprocess.run(["openssl", "x509", "-in", files["cert"], "-noout", "-subject", "-issuer", "-dates", "-serial"], capture_output=True, text=True)
          print(r.stdout.strip())

          print("\n=== CA CERT ===")
          r = subprocess.run(["openssl", "x509", "-in", files["ca"], "-noout", "-subject", "-issuer", "-dates"], capture_output=True, text=True)
          print(r.stdout.strip())

          print("\n=== CERT CHAIN VERIFY ===")
          r = subprocess.run(["openssl", "verify", "-CAfile", files["ca"], files["cert"]], capture_output=True, text=True)
          print(r.stdout.strip(), r.stderr.strip())

          # curl without auth
          print("\n=== CURL NO AUTH ===")
          r = subprocess.run(["curl", "-sk", "-o", "/dev/null", "-w", "HTTP %{http_code} from %{remote_ip}:%{remote_port}\n", server + "/api"], capture_output=True, text=True)
          print(r.stdout.strip())

          # curl WITH client cert
          print("\n=== CURL WITH CLIENT CERT ===")
          r = subprocess.run(["curl", "-s", "--cacert", files["ca"], "--cert", files["cert"], "--key", files["key"], "-o", "/dev/null", "-w", "HTTP %{http_code} from %{remote_ip}:%{remote_port}\n", server + "/api/v1/namespaces?limit=1"], capture_output=True, text=True)
          print("Result:", r.stdout.strip())
          if r.stderr.strip():
              print("stderr:", r.stderr.strip()[:200])

          # If curl failed, get body
          if "200" not in r.stdout:
              r2 = subprocess.run(["curl", "-s", "--cacert", files["ca"], "--cert", files["cert"], "--key", files["key"], server + "/api/v1/namespaces?limit=1"], capture_output=True, text=True)
              print("Response body:", r2.stdout[:500])

          # Python kubernetes client
          print("\n=== PYTHON KUBERNETES CLIENT ===")
          try:
              import kubernetes
              print("Version:", kubernetes.__version__)
          except Exception as e:
              print("Import failed:", e)

          print("OpenSSL:", ssl.OPENSSL_VERSION)

          try:
              from kubernetes import client, config
              config.load_kube_config(kc_path)
              api_client = client.ApiClient()
              print("Host:", api_client.configuration.host)
              print("SSL verify:", api_client.configuration.verify_ssl)
              print("Cert file:", api_client.configuration.cert_file)
              print("Key file:", api_client.configuration.key_file)
              print("CA cert:", api_client.configuration.ssl_ca_cert)
              v1 = client.CoreV1Api(api_client)
              ns = v1.list_namespace(limit=1)
              print("SUCCESS: listed", len(ns.items), "namespace(s)")
          except Exception as e:
              print("FAILED:", type(e).__name__, str(e)[:500])

          for f in files.values():
              os.unlink(f)

    - name: "[DEBUG] Run debug script"
      when: _remote_kubeconfig is defined
      ansible.builtin.command:
        cmd: "python3 /tmp/debug_kubeconfig.py {{ _remote_kubeconfig }}"
      register: _debug_result
      changed_when: false
      ignore_errors: true

    - name: "[DEBUG] Full debug output"
      when: _debug_result is not skipped
      ansible.builtin.debug:
        var: _debug_result.stdout_lines

    - name: "[DEBUG] Debug stderr (if any)"
      when: _debug_result is not skipped and _debug_result.stderr_lines | default([]) | length > 0
      ansible.builtin.debug:
        var: _debug_result.stderr_lines
    # --- END TEMPORARY DEBUG BLOCK ---

    - name: Discover cluster name from target cluster infrastructure
      block:
        - name: Query OpenShift infrastructure object for cluster name
          kubernetes.core.k8s_info:
            kubeconfig: "{{ _remote_kubeconfig | default(omit) }}"
            validate_certs: false
            api_version: config.openshift.io/v1
            kind: Infrastructure
            name: cluster
          register: _infra_result

        - name: Set cluster name from infrastructure object
          ansible.builtin.set_fact:
            _cluster_name: "{{ _infra_result.resources[0].status.infrastructureName }}"
          when: >-
            _infra_result.resources | length > 0 and
            _infra_result.resources[0].status.infrastructureName is defined

    - name: Fail if cluster name could not be determined
      ansible.builtin.fail:
        msg: >-
          Could not discover the cluster name from infrastructure.config.openshift.io/cluster
          on the target cluster. Verify the cluster is reachable and the Infrastructure
          CRD is available.
      when: _cluster_name is not defined or _cluster_name | default('') | length == 0

    - name: Sanitize cluster name for volume naming
      ansible.builtin.set_fact:
        _cluster_name: "{{ _cluster_name | lower | regex_replace('[^a-z0-9.-]', '') | truncate(63, True, '', 0) }}"

  tasks:
    - name: Provision StorageClasses for all configured tiers
      block:
        - name: Create StorageClasses on target cluster
          ansible.builtin.include_role:
            name: osac.service.storage_provider
          vars:
            storage_provider_action: ensure_storage_class
            storage_provider_tiers: "{{ _storage_tiers }}"
            storage_provider_block_encryption_passphrase: "{{ ansible_eda.event.payload.spec.blockEncryptionPassphrase | default('') }}"
            storage_provider_snapshots_enabled: "{{ _storage_snapshots }}"
      rescue:
        - name: Warn about StorageClass creation failure
          ansible.builtin.debug:
            msg: >-
              StorageClass creation failed on first attempt (task: {{ ansible_failed_task.name | default('unknown') }}).
              Retrying once.

        - name: Retry StorageClass creation
          ansible.builtin.include_role:
            name: osac.service.storage_provider
          vars:
            storage_provider_action: ensure_storage_class
            storage_provider_tiers: "{{ _storage_tiers }}"
            storage_provider_block_encryption_passphrase: "{{ ansible_eda.event.payload.spec.blockEncryptionPassphrase | default('') }}"
            storage_provider_snapshots_enabled: "{{ _storage_snapshots }}"
