---
# NetworkAttachment maps to adding a server port to a Netris V-Net
# Configures the BM host's switch port on the correct VLAN/V-Net
# before OS provisioning begins

- name: Extract network attachment configuration
  ansible.builtin.set_fact:
    na_host_id: "{{ network_attachment.host_id }}"
    na_logical_interface: "{{ network_attachment.logical_interface_name }}"
    na_mac_address: "{{ network_attachment.mac_address }}"
    na_subnet_ref: "{{ network_attachment.subnet_ref }}"
    na_primary: "{{ network_attachment.primary | default(false) }}"

- name: Look up Subnet CR by UUID label
  kubernetes.core.k8s_info:
    api_version: osac.openshift.io/v1alpha1
    kind: Subnet
    label_selectors:
      - "osac.openshift.io/subnet-uuid={{ na_subnet_ref }}"
  register: _subnet_lookup

- name: Fail if Subnet CR not found
  ansible.builtin.fail:
    msg: >-
      Subnet with UUID '{{ na_subnet_ref }}' not found.
      Ensure the Subnet has been created before creating a network attachment.
  when: _subnet_lookup.resources | length == 0

- name: Set subnet name (used as V-Net name in Netris)
  ansible.builtin.set_fact:
    na_subnet_name: "{{ _subnet_lookup.resources[0].metadata.name }}"

- name: Display network attachment information
  ansible.builtin.debug:
    msg:
      - "Creating Netris network attachment for host '{{ na_host_id }}'"
      - "Logical interface: {{ na_logical_interface }} (MAC: {{ na_mac_address }})"
      - "Subnet: {{ na_subnet_name }} (UUID: {{ na_subnet_ref }})"
      - "Primary: {{ na_primary }}"

- name: Ensure Netris auth
  ansible.builtin.include_role:
    name: netris.controller.auth
  when: netris_session_cookie is not defined

- name: Get existing V-Nets
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/vnet"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    return_content: true
    status_code: 200
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _vnet_list_resp
  no_log: true

- name: Find V-Net by subnet name
  ansible.builtin.set_fact:
    _target_vnet: >-
      {{ (_vnet_list_resp.json.data | default([]))
         | selectattr('name', 'equalto', na_subnet_name)
         | list | first | default(none) }}
  when: _vnet_list_resp.json is mapping

- name: Fail if V-Net not found
  ansible.builtin.fail:
    msg: >-
      V-Net '{{ na_subnet_name }}' not found in Netris controller.
      Ensure the Subnet has been provisioned before creating a network attachment.
  when: _target_vnet is not defined or _target_vnet is none

- name: Get Netris inventory servers
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/hw?type=server"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    return_content: true
    status_code: 200
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _server_list_resp
  no_log: true

- name: Find server by host_id
  ansible.builtin.set_fact:
    _target_server: >-
      {{ (_server_list_resp.json.data | default([]))
         | selectattr('name', 'equalto', na_host_id)
         | list | first | default(none) }}
  when: _server_list_resp.json is mapping

- name: Fail if server not found
  ansible.builtin.fail:
    msg: >-
      Server '{{ na_host_id }}' not found in Netris inventory.
      Ensure the bare-metal host is registered in Netris before creating a network attachment.
  when: _target_server is not defined or _target_server is none

- name: Get server ports
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/hw/ports?type=used&switchID={{ _target_server.id }}"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    return_content: true
    status_code: 200
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _ports_resp
  no_log: true

- name: Find port matching interface name
  ansible.builtin.set_fact:
    _target_port: >-
      {{ (_ports_resp.json.data | default([]))
         | selectattr('ifName', 'equalto', na_logical_interface)
         | list | first
         | default(
             (_ports_resp.json.data | default([]))
             | selectattr('port', 'equalto', na_logical_interface)
             | list | first | default(none)
           ) }}

- name: Fail if port not found
  ansible.builtin.fail:
    msg: >-
      Port '{{ na_logical_interface }}' not found on server '{{ na_host_id }}'.
      Available ports: {{ (_ports_resp.json.data | default([]))
                          | map(attribute='ifName')
                          | list }}.
  when: _target_port is none

- name: Check if port is already on V-Net
  ansible.builtin.set_fact:
    _port_already_on_vnet: >-
      {{ (_target_vnet.ports | default([]))
         | selectattr('id', 'equalto', _target_port.id)
         | list | length > 0 }}

- name: Set already existed flag
  ansible.builtin.set_fact:
    network_attachment_already_existed: "{{ _port_already_on_vnet }}"

- name: Build updated ports list
  ansible.builtin.set_fact:
    _updated_ports: >-
      {{ (_target_vnet.ports | default([]))
         + [{'id': _target_port.id, 'state': 'active', 'accessMode': true}] }}
  when: not _port_already_on_vnet

- name: Add port to V-Net
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/vnet/{{ _target_vnet.id }}"
    method: PUT
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
      Content-Type: "application/json"
    body_format: json
    body:
      ports: "{{ _updated_ports }}"
    return_content: true
    status_code: [200, 201]
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _vnet_update_resp
  when: not _port_already_on_vnet
  no_log: true

- name: Display network attachment result
  ansible.builtin.debug:
    msg: >-
      Network attachment for host '{{ na_host_id }}' interface '{{ na_logical_interface }}'
      on V-Net '{{ na_subnet_name }}'
      {{ (_port_already_on_vnet | bool) | ternary('already exists', 'created successfully') }}
      (port ID: {{ _target_port.id }}, V-Net ID: {{ _target_vnet.id }})

# --- Phase A: IPAM IP allocation ---

- name: Extract V-Net gateway info
  ansible.builtin.set_fact:
    _vnet_gateway_cidr: "{{ (_target_vnet.gateways | default([]))[0].prefix | default('') }}"

- name: Fail if V-Net has no gateway
  ansible.builtin.fail:
    msg: >-
      V-Net '{{ na_subnet_name }}' has no gateway configured.
      A gateway is required for IP allocation.
  when: _vnet_gateway_cidr | length == 0

- name: Parse gateway IP and prefix
  ansible.builtin.set_fact:
    _vnet_gateway_ip: "{{ _vnet_gateway_cidr | ansible.utils.ipaddr('address') }}"
    _vnet_prefix: "{{ _vnet_gateway_cidr | ansible.utils.ipaddr('prefix') }}"
    _vnet_network: "{{ _vnet_gateway_cidr | ansible.utils.ipaddr('network') }}"
    _vnet_broadcast: "{{ _vnet_gateway_cidr | ansible.utils.ipaddr('broadcast') }}"

- name: Look up IPAM subnet for this V-Net
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/ipam/subnets"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    return_content: true
    status_code: 200
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _ipam_subnets_resp
  no_log: true

- name: Find IPAM subnet matching V-Net CIDR
  ansible.builtin.set_fact:
    _ipam_subnet: >-
      {{ (_ipam_subnets_resp.json.data | default([]))
         | selectattr('prefix', 'equalto', _vnet_network + '/' + _vnet_prefix | string)
         | list | first | default(none) }}

- name: Fail if IPAM subnet not found
  ansible.builtin.fail:
    msg: >-
      IPAM subnet for '{{ _vnet_network }}/{{ _vnet_prefix }}' not found.
  when: _ipam_subnet is none

- name: Get used hosts in IPAM subnet
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/ipam/hosts/{{ _ipam_subnet.id }}"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    return_content: true
    status_code: 200
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _ipam_hosts_resp
  no_log: true

- name: Build used addresses set
  ansible.builtin.set_fact:
    _used_addresses: >-
      {{ (_ipam_hosts_resp.json.data | default([]))
         | map(attribute='address')
         | list }}

- name: Compute next available IP
  ansible.builtin.set_fact:
    _candidate_ip: "{{ _vnet_gateway_ip | ansible.utils.ipmath(item) }}"
  loop: "{{ range(1, 254) | list }}"
  when:
    - _allocated_ip is not defined
    - (_vnet_gateway_ip | ansible.utils.ipmath(item)) != _vnet_network
    - (_vnet_gateway_ip | ansible.utils.ipmath(item)) != _vnet_broadcast
    - (_vnet_gateway_ip | ansible.utils.ipmath(item)) not in _used_addresses

- name: Set allocated IP from first available candidate
  ansible.builtin.set_fact:
    _allocated_ip: "{{ _candidate_ip }}"
  when: _allocated_ip is not defined and _candidate_ip is defined

- name: Fail if no IP available
  ansible.builtin.fail:
    msg: >-
      No available IP address in subnet '{{ _vnet_network }}/{{ _vnet_prefix }}'.
  when: _allocated_ip is not defined

- name: Reserve IP in Netris IPAM
  ansible.builtin.uri:
    url: "{{ netris_controller_url }}/api/v2/reservation/ip"
    method: POST
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
      Content-Type: "application/json"
    body_format: json
    body:
      host:
        address: "{{ _allocated_ip }}"
        subnet:
          id: "{{ _ipam_subnet.id }}"
      consumer:
        id: "{{ _target_vnet.id }}"
        type: vnet
      meta:
        tag: "osac-bm-host"
        host_id: "{{ na_host_id }}"
        interface: "{{ na_logical_interface }}"
    return_content: true
    status_code: [200, 201]
    timeout: "{{ netris_timeout | default(30) }}"
    validate_certs: "{{ netris_validate_certs | default(true) }}"
  register: _reservation_resp
  no_log: true

- name: Set output fact for allocated IP
  ansible.builtin.set_fact:
    network_attachment_ip: "{{ _allocated_ip }}"

- name: Display IP allocation result
  ansible.builtin.debug:
    msg: >-
      Allocated IP '{{ _allocated_ip }}/{{ _vnet_prefix }}' for host '{{ na_host_id }}'
      on subnet '{{ na_subnet_name }}'
      (reservation ID: {{ _reservation_resp.json.data.id | default('unknown') }})

# --- Phase B + C: NMState config render and SSH apply ---

- name: Get server management IP from Netris inventory
  ansible.builtin.set_fact:
    _server_mgmt_ip: "{{ _target_server.mgmtAddress | default('') }}"

- name: Fail if server has no management IP
  ansible.builtin.fail:
    msg: >-
      Server '{{ na_host_id }}' has no management IP address in Netris inventory.
      Cannot apply NMState configuration without SSH access.
  when: _server_mgmt_ip | length == 0

- name: Resolve OS interface name from MAC address
  ansible.builtin.shell:
    cmd: |
      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 \
        -o 'ProxyCommand=ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -i {{ server_ssh_bastion_key }} -W %h:%p {{ server_ssh_bastion_user }}@{{ server_ssh_bastion_host }}' \
        -i {{ server_ssh_key }} \
        {{ server_ssh_user | default('core') }}@{{ _server_mgmt_ip }} \
        'ip -j link show | python3 -c "import sys,json; devs=json.load(sys.stdin); matches=[d[\"ifname\"] for d in devs if d.get(\"address\",\"\").lower()==\"{{ na_mac_address | lower }}\".lower()]; print(matches[0] if matches else \"\")"'
  register: _os_interface_result
  changed_when: false
  no_log: true

- name: Set OS interface name
  ansible.builtin.set_fact:
    _os_interface_name: "{{ _os_interface_result.stdout | trim }}"

- name: Fail if OS interface not found for MAC
  ansible.builtin.fail:
    msg: >-
      No OS interface found with MAC address '{{ na_mac_address }}' on host '{{ na_host_id }}'.
      Verify the MAC address matches a physical NIC on the server.
  when: _os_interface_name | length == 0

- name: Display resolved OS interface
  ansible.builtin.debug:
    msg: >-
      Resolved MAC '{{ na_mac_address }}' to OS interface '{{ _os_interface_name }}'
      on host '{{ na_host_id }}'

- name: Render NMState config for BM host
  ansible.builtin.set_fact:
    _nmstate_rendered_config: "{{ lookup('ansible.builtin.template', 'bm_network_attachment.yaml.j2') }}"
  vars:
    nmstate_interface: "{{ _os_interface_name }}"
    nmstate_ip: "{{ _allocated_ip }}"
    nmstate_prefix: "{{ _vnet_prefix }}"
    nmstate_gateway: "{{ _vnet_gateway_ip }}"
    nmstate_primary: "{{ na_primary | bool }}"
    nmstate_mgmt_interface: "{{ na_mgmt_interface | default(server_mgmt_interface | default('')) }}"
    nmstate_mgmt_route_destination: "{{ server_mgmt_route_destination }}"
    nmstate_mgmt_route_gateway: "{{ server_mgmt_route_gateway }}"

- name: Write NMState config to temp file
  ansible.builtin.copy:
    content: "{{ _nmstate_rendered_config }}"
    dest: "/tmp/nmstate-{{ na_host_id }}-{{ na_logical_interface }}.yaml"
    mode: "0644"

- name: Disable rp_filter on BM host
  ansible.builtin.shell:
    cmd: |
      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 \
        -o 'ProxyCommand=ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -i {{ server_ssh_bastion_key }} -W %h:%p {{ server_ssh_bastion_user }}@{{ server_ssh_bastion_host }}' \
        -i {{ server_ssh_key }} \
        {{ server_ssh_user | default('core') }}@{{ _server_mgmt_ip }} \
        'sudo sysctl -qw net.ipv4.conf.all.rp_filter=0'
  changed_when: false
  no_log: true

- name: Copy NMState config to BM host
  ansible.builtin.shell:
    cmd: |
      scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 \
        -o 'ProxyCommand=ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -i {{ server_ssh_bastion_key }} -W %h:%p {{ server_ssh_bastion_user }}@{{ server_ssh_bastion_host }}' \
        -i {{ server_ssh_key }} \
        /tmp/nmstate-{{ na_host_id }}-{{ na_logical_interface }}.yaml \
        {{ server_ssh_user | default('core') }}@{{ _server_mgmt_ip }}:/tmp/nmstate-config.yaml
  changed_when: true
  no_log: true

- name: Apply NMState config on BM host
  ansible.builtin.shell:
    cmd: |
      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 \
        -o 'ProxyCommand=ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -i {{ server_ssh_bastion_key }} -W %h:%p {{ server_ssh_bastion_user }}@{{ server_ssh_bastion_host }}' \
        -i {{ server_ssh_key }} \
        {{ server_ssh_user | default('core') }}@{{ _server_mgmt_ip }} \
        'nohup sudo nmstatectl apply /tmp/nmstate-config.yaml > /tmp/nmstate-apply.log 2>&1 &'
  changed_when: true
  no_log: true

- name: Clean up local temp file
  ansible.builtin.file:
    path: "/tmp/nmstate-{{ na_host_id }}-{{ na_logical_interface }}.yaml"
    state: absent

- name: Display NMState apply result
  ansible.builtin.debug:
    msg: >-
      NMState config applied on host '{{ na_host_id }}' —
      interface '{{ na_logical_interface }}' configured with IP '{{ _allocated_ip }}/{{ _vnet_prefix }}'
      {{ (na_primary | bool) | ternary('(primary — default gateway via ' + _vnet_gateway_ip + ')', '(secondary — no default gateway)') }}
