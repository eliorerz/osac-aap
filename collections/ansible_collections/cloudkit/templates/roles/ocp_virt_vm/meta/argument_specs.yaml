argument_specs:
  main:
    options:
      vm_order:
        type: dict
        required: true
        description: VM configuration
      template_parameters:
        type: dict
        description: VM configuration parameters
        options:
          vm_cpu_cores:
            description: Number of CPU cores for the VM.
            type: str
            required: false
            default: "2"
          vm_memory_size:
            description: Amount of memory for the VM.
            type: str
            required: false
            default: "4Gi"
          vm_disk_size:
            description: Size of the VM root disk.
            type: str
            required: false
            default: "50Gi"
          vm_image_source:
            description: >
              Container disk image or data source for the VM root disk.
              Can be a container image URL or PVC reference.
            type: str
            required: false
            default: "quay.io/containerdisks/fedora:latest"
          storage_class:
            description: StorageClass to use for VM persistent volumes.
            type: str
            required: false
            default: "nfs-client"
          cloud_init_config:
            description: >
              Cloud-init configuration for VM initialization.
              Can include user data, network config, etc.
            type: dict
            required: false
          ssh_public_key:
            description: >
              SSH public key to inject into the VM for remote access.
            type: str
            required: false
            default: ""
          vm_service_ports:
            description: >
              Ports to expose on the VM for ingress traffic.
              The syntax is a comma-separated list of `<port>/<protocol>` pairs, where `<protocol>` is either `tcp` or `udp`.
              For example, `22/tcp,80/tcp` will expose tcp ports 22 and 80 on the VM.
            type: str
            required: false
            default: "22/tcp"
